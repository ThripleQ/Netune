keybindings:
  move_down:    ["j", "down"]
  move_up:      ["k", "up"]
  panel_switch: ["tab"]
  play_pause:   ["space"]
  play_select:  ["enter"]
  next_track:   ["n"]
  prev_track:   ["p"]
  seek_forward:  ["right"]
  seek_backward: ["left"]
  volume_up:    ["+", "="]
  volume_down:  ["-"]
  cycle_loop:   ["l"]
  quit:         ["q"]
