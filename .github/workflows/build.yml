name: Build

on:
  push:
    branches: [ master ]
    tags: [ "v*" ]
  release:
    types: [ published ]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake pkg-config \
            libasound2-dev libpulse-dev libsdl2-dev \
            libavformat-dev libavcodec-dev libswresample-dev \
            libyaml-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Strip
        run: strip build/netune

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: netune-linux
          path: |
            build/netune
            build/netease-cli

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$pwd\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install deps
        run: vcpkg install ffmpeg:x64-windows sdl2:x64-windows yyjson:x64-windows libyaml:x64-windows

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Collect DLLs
        run: |
          $bin = "$env:VCPKG_ROOT\installed\x64-windows\bin"
          Copy-Item "$bin\avformat*.dll", "$bin\avcodec*.dll", "$bin\avutil*.dll",
            "$bin\swresample*.dll", "$bin\SDL2*.dll",
            "$bin\yyjson*.dll", "$bin\yaml*.dll" build\Release\

      - name: Build netease-cli
        run: |
          cd src\plugins\music_sources\netease\netease-cli
          go build -ldflags="-s -w" -o netease-cli.exe .
          move netease-cli.exe ..\..\..\..\build\Release\

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: netune-windows
          path: build\Release\*

  release:
    if: github.event_name == 'release'
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Package
        run: |
          cd netune-linux && tar czf ../netune-linux.tar.gz * && cd ..
          cd netune-windows && zip -r ../netune-windows.zip * && cd ..

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            netune-linux.tar.gz
            netune-windows.zip
