name: Build

on:
  push:
    branches: [ master ]
    tags: [ "v*" ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]

jobs:
  # ── Linux (Arch-based, static-ish) ──────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake pkg-config \
            libasound2-dev libpulse-dev libsdl2-dev \
            libavformat-dev libavcodec-dev libswresample-dev \
            libyaml-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Strip
        run: strip build/netune

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netune-linux-x86_64
          path: |
            build/netune
            build/netease-cli

  # ── Windows (MSVC + vcpkg) ─────────────────────────
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git "$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Install deps with vcpkg
        run: |
          vcpkg install ffmpeg:x64-windows sdl2:x64-windows yyjson:x64-windows libyaml:x64-windows

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Collect DLLs
        run: |
          # Copy vcpkg DLLs next to the exe
          $dlls = @(
            "avformat", "avcodec", "avutil", "swresample",
            "SDL2",
            "yyjson",
            "yaml-0.1"
          )
          $vcpkg_bin = "$env:VCPKG_ROOT\installed\x64-windows\bin"
          foreach ($dll in $dlls) {
            Copy-Item "$vcpkg_bin\$dll*.dll" build\Release\ -ErrorAction SilentlyContinue
          }

      - name: Build netease-cli (Go)
        run: |
          cd src\plugins\music_sources\netease\netease-cli
          go build -ldflags="-s -w" -o netease-cli.exe .
          move netease-cli.exe ..\..\..\..\build\Release\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netune-windows-x86_64
          path: build\Release\*

  # ── Package release ────────────────────────────────
  package:
    if: github.event_name == 'release'
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create release archives
        run: |
          cd netune-linux-x86_64
          tar czf ../netune-linux-x86_64.tar.gz *
          cd ../netune-windows-x86_64
          zip -r ../netune-windows-x86_64.zip *
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            netune-linux-x86_64.tar.gz
            netune-windows-x86_64.zip
